name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  unit:
    name: Offline checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Unit tests + lint + fat JAR
        run: ./gradlew check shadowJar

  windows-worker:
    name: Forked worker checks (Windows)
    runs-on: windows-latest
    needs: unit
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Forked worker protocol, path, and distribution tests
        run: |
          .\gradlew.bat --no-daemon :core:test --tests io.github.skhokhlov.rewriterunner.ForkedExecutionTest --tests io.github.skhokhlov.rewriterunner.execution.ForkedWorkerProtocolLifecycleTest --tests io.github.skhokhlov.rewriterunner.plugin.PluginTempFilesTest
          .\gradlew.bat --no-daemon :cli:testIntegration --tests io.github.skhokhlov.rewriterunner.integration.ForkedDistributionIntegrationTest

  plugin-real:
    name: Integration tests (real plugins)
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Cache Maven local repository
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Cache test toolchains (Maven/Gradle distributions)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          # The Gradle distribution version baked into this cache is determined by the project's
          # own gradle-wrapper.properties. The hashFiles entry below ensures bumping the wrapper
          # automatically evicts a stale cached distribution.
          path: cli/build/test-cache/toolchains
          key: toolchains-${{ runner.os }}-v4-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: toolchains-${{ runner.os }}-v4-

      - name: Real-plugin integration tests
        run: ./gradlew :cli:testRealPlugin --info
        timeout-minutes: 25

      - name: Upload real-plugin diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: real-plugin-diagnostics
          path: |
            cli/build/reports/tests/testRealPlugin
            cli/build/test-results/testRealPlugin
          if-no-files-found: warn
          retention-days: 14

  container:
    name: Container acceptance (2 GiB cgroup)
    runs-on: ubuntu-latest
    needs: plugin-real

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Container acceptance
        run: ./gradlew :cli:testContainer --info
        timeout-minutes: 15

      - name: Upload container diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: container-diagnostics
          path: |
            cli/build/reports/tests/testContainer
            cli/build/test-results/testContainer
          if-no-files-found: warn
          retention-days: 14
