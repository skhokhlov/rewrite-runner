[versions]
kotlin = "2.4.10"
shadow = "9.6.1"
picocli = "4.7.7"
ktlint-cli = "1.8.0"
logback-classic = "1.5.38"
kotest-runner-junit5 = "6.2.3"
rewrite-recipe-bom = "3.35.0"
rewrite-gradle = "8.87.6"
maven-model = "3.9.16"
maven-resolver = "2.0.20"
jackson = "3.2.1"
dokka = "2.2.0"
com-vanniktech-maven-publish-gradle-plugin = "0.37.0"
cyclonedx-gradle-plugin = "3.3.0"
rewrite-gradle-plugin = "7.32.1"
rewrite-maven-plugin = "6.44.0"

[libraries]
picocli = { group = "info.picocli", name = "picocli", version.ref = "picocli" }
picocli-codegen = { group = "info.picocli", name = "picocli-codegen", version.ref = "picocli" }
logback-classic = { group = "ch.qos.logback", name = "logback-classic", version.ref = "logback-classic" }
kotest-runner-junit5 = { group = "io.kotest", name = "kotest-runner-junit5", version.ref = "kotest-runner-junit5" }
ktlint-cli = { group = "com.pinterest.ktlint", name = "ktlint-cli", version.ref = "ktlint-cli" }
kotlin-gradle-plugin = { group = "org.jetbrains.kotlin", name = "kotlin-gradle-plugin", version.ref = "kotlin" }
rewrite-recipe-bom = { group = "org.openrewrite.recipe", name = "rewrite-recipe-bom", version.ref = "rewrite-recipe-bom" }
rewrite-gradle = { group = "org.openrewrite", name = "rewrite-gradle", version.ref = "rewrite-gradle" }
maven-model = { group = "org.apache.maven", name = "maven-model", version.ref = "maven-model" }
maven-resolver-api = { group = "org.apache.maven.resolver", name = "maven-resolver-api", version.ref = "maven-resolver" }
maven-resolver-impl = { group = "org.apache.maven.resolver", name = "maven-resolver-impl", version.ref = "maven-resolver" }
maven-resolver-supplier-mvn3 = { group = "org.apache.maven.resolver", name = "maven-resolver-supplier-mvn3", version.ref = "maven-resolver" }
jackson-dataformat-yaml = { group = "tools.jackson.dataformat", name = "jackson-dataformat-yaml", version.ref = "jackson" }
jackson-module-kotlin = { group = "tools.jackson.module", name = "jackson-module-kotlin", version.ref = "jackson" }
org-jetbrains-dokka-gradle-plugin = { group = "org.jetbrains.dokka", name = "org.jetbrains.dokka.gradle.plugin", version.ref = "dokka" }
org-jetbrains-dokka-javadoc-gradle-plugin = { group = "org.jetbrains.dokka-javadoc", name = "org.jetbrains.dokka-javadoc.gradle.plugin", version.ref = "dokka" }
com-vanniktech-maven-publish-gradle-plugin = { group = "com.vanniktech.maven.publish", name = "com.vanniktech.maven.publish.gradle.plugin", version.ref = "com-vanniktech-maven-publish-gradle-plugin" }
org-cyclonedx-bom-gradle-plugin = { group = "org.cyclonedx.bom", name = "org.cyclonedx.bom.gradle.plugin", version.ref = "cyclonedx-gradle-plugin" }
# Not consumed on any compile/runtime classpath — declared so Dependabot opens PRs against the
# versions above. The resolved versions are injected into Kotlin via the `generatePluginVersions`
# task in core/build.gradle.kts. Module coordinates match what the runtime strategies pull:
#   GradlePluginStrategy emits  classpath("org.openrewrite:plugin:<v>")
#   MavenPluginStrategy  emits  org.openrewrite.maven:rewrite-maven-plugin:<v>:<goal>
rewrite-gradle-plugin = { group = "org.openrewrite", name = "plugin", version.ref = "rewrite-gradle-plugin" }
rewrite-maven-plugin = { group = "org.openrewrite.maven", name = "rewrite-maven-plugin", version.ref = "rewrite-maven-plugin" }

[plugins]
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
