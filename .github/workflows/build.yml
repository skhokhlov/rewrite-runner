name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew check shadowJar

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: openrewrite-runner
          path: cli/build/libs/cli-*-all.jar

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            core/build/reports/jacoco/test/
            cli/build/reports/jacoco/test/

      - name: Report coverage on PR
        uses: madrapps/jacoco-report@v1.7.1
        if: github.event_name == 'pull_request'
        with:
          paths: |
            ${{ github.workspace }}/core/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/cli/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Test Coverage
          update-comment: true
